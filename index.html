    --accent: #6366f1;
    --accent-light: #e0e7ff;
    --text-primary: #1a1d29;
    --text-secondary: #5b6472;
    --text-tertiary: #9aa3b0;
    --border: #e7e9ef;
    --bg-sidebar: #f7f8fc;
    --bg-page: #ffffff;
    --radius: 12px;

    --c2-bg: #e0e7ff; --c2-fg: #6366f1; /* indigo — ML */
    --c3-bg: #ccfbf1; --c3-fg: #0d9488; /* teal — experimentation */
    --c4-bg: #fef3c7; --c4-fg: #f59e0b; /* amber — AI agents */
    --c5-bg: #ffe4e6; --c5-fg: #f43f5e; /* rose — semantic layer */
    --c6-bg: #e0f2fe; --c6-fg: #0ea5e9; /* sky — meta / how this was built */
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-primary);
    background: var(--bg-page);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .layout {
    display: flex;
    min-height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    border-top: 5px solid transparent;
    border-image: linear-gradient(90deg, var(--c1-fg), var(--c2-fg), var(--c3-fg), var(--c4-fg), var(--c5-fg), var(--c6-fg)) 1;
    padding: 1.85rem 1.5rem 2rem;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #6366f1 55%, #a78bfa);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 20px;
    margin-bottom: 0.75rem;
    box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
  }

  .sidebar-header {
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .sidebar-header:hover {
    opacity: 0.8;
  }

  .sidebar h1 {
    font-size: 19px;
    font-weight: 700;
    margin: 0 0 0.75rem;
    letter-spacing: -0.01em;
  }

  .contact {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin: 0 0 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 6px 8px;
    margin: 0 -8px;
    border-radius: 7px;
    word-break: break-all;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .contact-item:hover {
    background: var(--accent-light);
    color: var(--accent);
  }

  .contact-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .contact-icon svg {
    width: 14px;
    height: 14px;
  }

  .contact-item:hover .contact-icon {
    background: var(--accent);
    color: #fff;
  }

  .nav h2 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-tertiary);
    margin: 0 0 0.75rem;
  }

  .nav-section {
    margin-bottom: 4px;
  }

  .nav-section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 4px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    user-select: none;
  }

  .nav-section-title:hover {
    background: rgba(0,0,0,0.03);
  }

  .nav-section-title .chevron {
    font-size: 10px;
    color: var(--text-tertiary);
    transition: transform 0.15s ease;
    width: 10px;
    flex-shrink: 0;
  }

  .nav-section.collapsed .chevron {
    transform: rotate(-90deg);
  }

  .section-icon {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 0 1px color-mix(in srgb, currentColor 18%, transparent);
  }

  .section-icon svg {
    width: 14px;
    height: 14px;
  }

  .nav-projects {
    overflow: hidden;
    padding-left: 4px;
    border-left: 1px solid var(--border);
    margin-left: 17px;
  }

  .nav-section.collapsed .nav-projects {
    display: none;
  }

  .nav-project {
    display: block;
    padding: 7px 12px 7px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    margin: 1px 0;
    border-left: 2px solid transparent;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .nav-project:hover {
    background: rgba(0,0,0,0.03);
    color: var(--text-primary);
  }

  .nav-project.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
    border-left-color: var(--accent);
    margin-left: -1px;
    box-shadow: 0 2px 10px -2px color-mix(in srgb, var(--accent) 35%, transparent);
  }

  /* ---------- Main content ---------- */
  .main {
    flex: 1;
    padding: 2.5rem 3rem;
    min-width: 0;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin: 0 0 6px;
  }

  .main h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 1.25rem;
  }

  .hook {
    font-size: 17px;
    line-height: 1.65;
    color: var(--text-primary);
    font-style: italic;
    padding: 14px 18px;
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 0 0 1.75rem;
  }

  .impact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin: 0 0 2rem;
  }

  .impact-card {
    background: var(--bg-sidebar);
    border-radius: var(--radius);
    border-left: 3px solid var(--accent);
    padding: 1rem 1.1rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .impact-card:hover {
    transform: translateY(-3px);
    background: var(--bg-page);
    box-shadow: 0 10px 24px -8px color-mix(in srgb, currentColor 45%, transparent);
  }

  .impact-card .value {
    font-size: 22px;
    font-weight: 700;
    color: inherit;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .impact-card .label {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin: 0;
  }

  .main h2 {
    font-size: 16px;
    font-weight: 600;
    margin: 1.75rem 0 0.6rem;
  }

  .main p {
    font-size: 15px;
    color: var(--text-primary);
    margin: 0 0 0.75rem;
  }

  .impact-heading {
    margin-top: 1.75rem;
    margin-bottom: 0.75rem;
  }

  /* ---------- Home view ---------- */
  .home-tagline {
    font-size: 17px;
    color: var(--text-secondary);
    margin: 0 0 1.5rem;
  }

  .home-bio {
    font-size: 15px;
    margin: 0 0 2rem;
    max-width: 640px;
  }

  .home-skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin: 0 0 1rem;
  }

  .home-skill-card {
    background: var(--bg-sidebar);
    border-radius: var(--radius);
    border-top: 3px solid var(--card-accent);
    padding: 1rem 1.1rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .home-skill-card:hover {
    transform: translateY(-3px);
    background: var(--bg-page);
    box-shadow: 0 10px 24px -8px color-mix(in srgb, var(--card-accent) 45%, transparent);
  }

  .home-skill-card .label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 8px;
  }

  .home-skill-card .items {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
    line-height: 1.6;
  }

  .home-hint {
    font-size: 13.5px;
    color: var(--text-tertiary);
    margin-top: 2rem;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 640px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      height: auto;
      position: relative;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .main { padding: 1.75rem 1.25rem; }
  }
</style>
</head>

  return '<span class="section-icon" style="background:var(--' + color + '-bg);color:var(--' + color + '-fg)">' + icons[icon] + '</span>';

    name: "Causal Inference & Impact Studies",

  "causal-study": {
    title: "SMS Adoption Causal Study",
    section: "Causal Inference & Impact Studies",
    hook: "SMS was a new product at Mailchimp, still early in its growth. To position it in the company's strategy, we needed to answer one question: does SMS actually grow the business, or are already-successful customers just more likely to try it? This causal study answered that — and the result repositioned SMS as a core growth lever.",
    problem: "Comparing SMS buyers to non-buyers directly would have been misleading — customers who chose to buy SMS were already more active and higher-spending before they ever made that purchase. A simple before/after comparison would have credited SMS for revenue that was already on its way.",
    whatIDid: "I used coarsened exact matching to find non-SMS customers who looked statistically identical to SMS buyers across 11 pre-purchase characteristics — account age, list size, prior revenue, email and automation activity, and more. This produced a matched comparison group of 522K non-SMS users for roughly 13,500 first-time SMS buyers. I then measured the change in revenue before and after the purchase moment for both groups, focusing specifically on non-SMS revenue — the cleanest test of whether SMS adoption changes broader customer behavior.",
    results: "SMS adoption caused a 79% lift in 90-day revenue for buyers versus their matched counterparts. Even when SMS spend itself was excluded entirely, those customers still spent 28% more across the rest of Mailchimp — more email plan upgrades, more automation usage, more overall engagement.",

      { value: "+79%", label: "90-day revenue lift" },
      { value: "+28%", label: "Non-SMS spend lift" },
      { value: "522K", label: "Users matched" }

  },
  "propensity-model": {
    title: "SMS Adoption Propensity Model",
    section: "ML & Predictive Models",
    hook: "I built a machine learning model that became the engine behind Mailchimp's SMS growth strategy — it told the product team who to target, when, and where, and directly informed five product experiments projected to bring in $4.8M over 12 months.",
    problem: "SMS penetration had plateaued at roughly 3% of about 1 million eligible paid customers. The team had no way to proactively identify which customers were ready to adopt SMS, or when and where to reach them — growth depended entirely on customers discovering the product themselves.",
    whatIDid: "I built an XGBoost-based propensity model to predict which customers were most likely to start an SMS application — chosen deliberately over predicting a completed purchase, since application start is the earliest and most actionable signal of intent. The model was trained on roughly 243,000 examples using 700+ behavioral and account signals, including custom features like the share of a customer's contacts with phone numbers, recent ecommerce activity, and signals from onboarding. I used SHAP analysis to translate the model's output into specific, actionable recommendations for product, marketing, and sales teams — not just a score, but a 'why'.",
    results: "The model achieved 82% AUC with a 1.4–1.6x lift over baseline targeting and was deployed to score the full eligible customer base on an ongoing basis. Its findings — including which moments and segments carried the highest propensity — directly seeded five downstream product experiments, projected to deliver $4.8M in revenue over 12 months.",

  "cross-sell-experiment": {

    hook: "The causal study showed SMS adoption pulls customers deeper into Mailchimp — they end up spending 28% more on everything else. That raised the next question: how do we get more customers to adopt? The propensity model pointed to the moment, and this experiment tested it — driving a projected $2.3M in 12-month revenue.",
    problem: "Two patterns stood out in the data: customers are most open to trying a new product in the first few weeks after signing up, and over half of all SMS signups already happen on the same day as a customer's first Mailchimp purchase. The opportunity was to meet customers at that exact moment, but no such prompt existed.",
    whatIDid: "I designed and ran a multi-variant A/B test that added an SMS signup prompt at the end of the onboarding flow, immediately after a customer completed their plan purchase. One variant showed the prompt only to customers who had already expressed interest in SMS; a second showed it to all customers with general marketing intent. Both were compared against a no-prompt control, sized for roughly 5,000 users per arm over 35 days, with revenue, SMS attach rate, and core onboarding metrics as guardrails.",
    results: "The broadly-shown variant nearly doubled SMS attach rate (from 6% to 11%, 96% probability to beat control) and lifted 14-day revenue per user by 11%, with onboarding completion holding flat — no disruption to the core experience. The most interesting finding: 69% of the revenue lift came from non-SMS Mailchimp revenue, not SMS itself, directly confirming the causal study's finding under controlled conditions. This variant was rolled out as the new default experience.",
    impact: [
      { value: "6% → 11%", label: "SMS attach rate (+82% relative)" },

  "contact-import-prompt": {

function renderNav() {
  const nav = document.getElementById("nav");
  const heading = nav.querySelector("h2");
  nav.innerHTML = "";
  nav.appendChild(heading);

  sections.forEach((section, idx) => {
    const sectionEl = document.createElement("div");
    sectionEl.className = "nav-section";

    const titleEl = document.createElement("div");
    titleEl.className = "nav-section-title";
    titleEl.innerHTML = '<span class="chevron">▼</span>' + iconBadge(section.color, section.icon) + '<span>' + section.name + '</span>';
    titleEl.addEventListener("click", () => {
      sectionEl.classList.toggle("collapsed");
    });

    const projectsEl = document.createElement("div");
    projectsEl.className = "nav-projects";

    section.projects.forEach(pid => {
      const p = projects[pid];
      const projEl = document.createElement("div");
      projEl.className = "nav-project" + (pid === activeProjectId ? " active" : "");
      projEl.textContent = p.title;
      projEl.dataset.id = pid;
      projEl.addEventListener("click", () => selectProject(pid));
      projectsEl.appendChild(projEl);
    });

    sectionEl.appendChild(titleEl);
    sectionEl.appendChild(projectsEl);
    nav.appendChild(sectionEl);
  });
}

function renderHome() {
  const main = document.getElementById("main");

  const skillCards = skillGroups.map(group =>
    '<div class="home-skill-card" style="--card-accent:var(--' + group.color + '-fg)"><p class="label">' + iconBadge(group.color, group.icon) + group.label + '</p><p class="items">' + group.items + '</p></div>'
  ).join("");

  main.innerHTML =
    '<p class="eyebrow">Welcome</p>' +
    '<h1>Himanshu Dubey</h1>' +
    '<p class="home-tagline">Senior Product Analyst with 7+ years in propensity modeling, causal inference, and A/B experimentation. Delivered $5M+ in incremental revenue and scaled experimentation velocity 5x across high-velocity SaaS environments.</p>' +
    '<h2>Skills</h2>' +
    '<div class="home-skills-grid">' + skillCards + '</div>' +
    '<p class="home-hint">Select a project from the left to see the full case study.</p>';
}

function renderMain(pid) {
  const p = projects[pid];
  const main = document.getElementById("main");
  const color = sectionColor[p.section];

  const impactCards = p.impact.map(item =>
    '<div class="impact-card" style="color:var(--' + color + '-fg);border-left-color:var(--' + color + '-fg)"><p class="value">' + item.value + '</p><p class="label">' + item.label + '</p></div>'
  ).join("");

  main.innerHTML =
    '<p class="eyebrow" style="color:var(--' + color + '-fg)">' + p.section + '</p>' +
    '<h1>' + p.title + '</h1>' +
    '<p class="hook" style="border-left-color:var(--' + color + '-fg);background:var(--' + color + '-bg)">' + p.hook + '</p>' +
    '<h2>The Problem</h2>' +
    '<p>' + p.problem + '</p>' +
    '<h2>What I Did</h2>' +
    '<p>' + p.whatIDid + '</p>' +
    '<h2>Results</h2>' +
    '<p>' + p.results + '</p>' +
    '<h2 class="impact-heading">Business Impact</h2>' +
    '<div class="impact-grid">' + impactCards + '</div>';
}

function selectProject(pid) {
  activeProjectId = pid;
  document.querySelectorAll(".nav-project").forEach(el => {
    el.classList.toggle("active", el.dataset.id === pid);
  });
  renderMain(pid);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goHome() {
  activeProjectId = null;
  document.querySelectorAll(".nav-project").forEach(el => {
    el.classList.remove("active");
  });
  renderHome();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("home-link").addEventListener("click", goHome);

renderNav();
renderHome();
</script>
