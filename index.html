<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Himanshu Dubey — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #6366f1;
    --accent-light: #e0e7ff;
    --text-primary: #1a1d29;
    --text-secondary: #5b6472;
    --text-tertiary: #9aa3b0;
    --border: #e7e9ef;
    --bg-sidebar: #f7f8fc;
    --bg-page: #ffffff;
    --radius: 12px;

    --c1-bg: #ede9fe; --c1-fg: #8b5cf6; /* violet — causal */
    --c2-bg: #e0e7ff; --c2-fg: #6366f1; /* indigo — ML */
    --c3-bg: #ccfbf1; --c3-fg: #0d9488; /* teal — experimentation */
    --c4-bg: #fef3c7; --c4-fg: #f59e0b; /* amber — AI agents */
    --c5-bg: #ffe4e6; --c5-fg: #f43f5e; /* rose — semantic layer */
    --c6-bg: #e0f2fe; --c6-fg: #0ea5e9; /* sky — meta / how this was built */
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-primary);
    background: var(--bg-page);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .layout {
    display: flex;
    min-height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    border-top: 5px solid transparent;
    border-image: linear-gradient(90deg, var(--c1-fg), var(--c2-fg), var(--c3-fg), var(--c4-fg), var(--c5-fg), var(--c6-fg)) 1;
    padding: 1.25rem 1.5rem;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #6366f1 55%, #a78bfa);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 0.5rem;
    box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
  }

  .sidebar-header {
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .sidebar-header:hover {
    opacity: 0.8;
  }

  .sidebar h1 {
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }

  .sidebar .title {
    font-size: 12.5px;
    font-style: italic;
    color: var(--text-secondary);
    margin: 0 0 0.5rem;
  }

  .contact {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin: 0 0 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 4px 8px;
    margin: 0 -8px;
    border-radius: 7px;
    word-break: break-all;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .contact-item:hover {
    background: var(--accent-light);
    color: var(--accent);
  }

  .contact-icon {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .contact-icon svg {
    width: 14px;
    height: 14px;
  }

  .contact-item:hover .contact-icon {
    background: var(--accent);
    color: #fff;
  }

  .nav h2 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-tertiary);
    margin: 0 0 0.4rem;
  }

  .nav-section {
    margin-bottom: 1px;
  }

  .nav-section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    user-select: none;
  }

  .nav-section-title:hover {
    background: rgba(0,0,0,0.03);
  }

  .nav-section-title .chevron {
    font-size: 10px;
    color: var(--text-tertiary);
    transition: transform 0.15s ease;
    width: 10px;
    flex-shrink: 0;
  }

  .nav-section.collapsed .chevron {
    transform: rotate(-90deg);
  }

  .section-icon {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 0 1px color-mix(in srgb, currentColor 18%, transparent);
  }

  .section-icon svg {
    width: 12px;
    height: 12px;
  }

  .nav-projects {
    overflow: hidden;
    padding-left: 4px;
    border-left: 1px solid var(--border);
    margin-left: 17px;
  }

  .nav-section.collapsed .nav-projects {
    display: none;
  }

  .nav-project {
    display: block;
    padding: 7px 12px 7px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    margin: 1px 0;
    border-left: 2px solid transparent;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .nav-project:hover {
    background: rgba(0,0,0,0.03);
    color: var(--text-primary);
  }

  .nav-project.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
    border-left-color: var(--accent);
    margin-left: -1px;
    box-shadow: 0 2px 10px -2px color-mix(in srgb, var(--accent) 35%, transparent);
  }

  /* ---------- Main content ---------- */
  .main {
    flex: 1;
    padding: 2.5rem 3rem;
    min-width: 0;
  }
  /* Reserve a right gutter so content clears the fixed "Built with Claude" seal. */
  @media (min-width: 641px) {
    .main { padding-right: 7.5rem; }
  }

  .home-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    cursor: pointer;
    margin: 0 0 1.25rem;
    padding: 6px 10px 6px 8px;
    border-radius: 7px;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .home-back svg {
    width: 15px;
    height: 15px;
  }

  .home-back:hover {
    background: var(--accent-light);
    color: var(--accent);
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin: 0 0 6px;
  }

  .main h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 1.25rem;
  }

  .hook {
    font-size: 17px;
    line-height: 1.65;
    color: var(--text-primary);
    padding: 14px 18px;
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 0 0 1.75rem;
  }

  .metrics-table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 1.75rem;
    font-size: 13.5px;
  }

  .metrics-table th,
  .metrics-table td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .metrics-table th {
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-tertiary);
  }

  .metrics-table td.metric-type {
    font-weight: 700;
    white-space: nowrap;
  }

  .metrics-table td.metric-name {
    color: var(--text-primary);
  }

  .metrics-table tbody tr:last-child td {
    border-bottom: none;
  }

  .tools-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 0 1.75rem;
  }

  .tool-tag {
    font-size: 12.5px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .impact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin: 0 0 2rem;
  }

  .impact-card {
    background: var(--bg-sidebar);
    border-radius: var(--radius);
    border-left: 3px solid var(--accent);
    padding: 1rem 1.1rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .impact-card:hover {
    transform: translateY(-3px);
    background: var(--bg-page);
    box-shadow: 0 10px 24px -8px color-mix(in srgb, currentColor 45%, transparent);
  }

  .impact-card .value {
    font-size: 22px;
    font-weight: 700;
    color: inherit;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .impact-card .label {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin: 0;
  }

  .main h2 {
    font-size: 16px;
    font-weight: 600;
    margin: 1.75rem 0 0.6rem;
  }

  .main p {
    font-size: 15px;
    color: var(--text-primary);
    margin: 0 0 0.75rem;
  }

  .impact-heading {
    margin-top: 0.75rem;
  }

  .story-list {
    margin: 0 0 0.75rem;
    padding-left: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .story-list li {
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.6;
  }

  /* ---------- Home view ---------- */
  .home-tagline {
    font-size: 17px;
    color: var(--text-secondary);
    margin: 0 0 1.5rem;
  }

  .home-bio {
    font-size: 15px;
    margin: 0 0 2rem;
    max-width: 640px;
  }

  .achievement-list {
    margin: 0 0 1rem;
    padding-left: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .achievement-list li {
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .achievement-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--accent-light);
    color: var(--accent);
    margin: 0 0 2.5rem;
  }

  .achievement-badge svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .home-skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin: 0 0 1rem;
  }

  .home-skill-card {
    background: var(--bg-sidebar);
    border-radius: var(--radius);
    border-top: 3px solid var(--card-accent);
    padding: 1rem 1.1rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .home-skill-card:hover {
    transform: translateY(-3px);
    background: var(--bg-page);
    box-shadow: 0 10px 24px -8px color-mix(in srgb, var(--card-accent) 45%, transparent);
  }

  .home-skill-card .label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 8px;
  }

  .home-skill-card .items {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
    line-height: 1.6;
  }

  .home-hint {
    font-size: 13.5px;
    font-style: italic;
    color: var(--text-tertiary);
    margin-top: 2.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }

  /* ---------- Education ---------- */
  .home-edu-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 0 0 1rem;
  }
  .edu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-sidebar);
    border-radius: 9px;
    border-left: 3px solid var(--edu-accent, var(--accent));
    padding: 0.5rem 0.85rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .edu-item:hover {
    transform: translateY(-2px);
    background: var(--bg-page);
    box-shadow: 0 8px 20px -8px color-mix(in srgb, var(--edu-accent, var(--accent)) 45%, transparent);
  }
  .edu-body { flex: 1; min-width: 0; }
  .edu-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .edu-degree {
    font-size: 13px;
    font-weight: 700;
    margin: 0;
    line-height: 1.35;
  }
  .edu-field { font-weight: 500; color: var(--text-secondary); }
  .edu-date {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-tertiary);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .edu-school {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 0;
    line-height: 1.35;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 640px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      height: auto;
      position: relative;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .main { padding: 1.75rem 1.25rem; }
  }

  /* ================= Intro sphere overlay ================= */
  #intro-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: radial-gradient(circle at 50% 38%, #241f52 0%, #151138 42%, #060314 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: opacity 0.7s ease, transform 0.7s ease, filter 0.7s ease;
  }
  #intro-overlay.intro-hide {
    opacity: 0;
    transform: scale(1.08);
    filter: blur(8px);
    pointer-events: none;
  }

  .intro-bg { position: absolute; inset: 0; pointer-events: none; }
  .intro-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 34px 34px;
    -webkit-mask: radial-gradient(circle at 50% 45%, #000 25%, transparent 72%);
    mask: radial-gradient(circle at 50% 45%, #000 25%, transparent 72%);
    opacity: 0.55;
  }
  .intro-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(260px circle at var(--mx, 50%) var(--my, 42%), rgba(129,140,248,0.20), transparent 70%);
  }

  .intro-stage {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .intro-sphere { position: relative; width: 0; height: 0; transform: translateX(-10vw); }

  .intro-word {
    position: absolute;
    left: 0;
    top: 0;
    white-space: nowrap;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;
    will-change: transform, opacity;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: auto;
  }

  .intro-cta {
    position: absolute;
    top: 50%;
    right: 5%;
    transform: translateY(-50%);
    max-width: 340px;
    text-align: center;
    padding: 0 1rem;
  }
  .intro-cta-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transform: translateY(18px);
    animation: introReveal 0.9s cubic-bezier(0.2,0.7,0.2,1) 2.2s forwards;
  }
  .intro-eyebrow {
    margin: 0 0 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #8b93c9;
  }
  .intro-tagline {
    margin: 0 0 26px;
    font-size: 21px;
    font-weight: 600;
    line-height: 1.45;
    color: #eef0ff;
    letter-spacing: 0.01em;
  }
  .intro-btn {
    display: inline-block;
    padding: 13px 28px;
    border: none;
    border-radius: 999px;
    font: 600 15px 'Inter', sans-serif;
    color: #fff;
    background: linear-gradient(135deg, #818cf8, #6366f1 55%, #a78bfa);
    box-shadow: 0 8px 30px -6px rgba(99,102,241,0.7);
    cursor: pointer;
    animation: introPulse 2.2s ease-in-out infinite;
  }
  @keyframes introReveal { to { opacity: 1; transform: translateY(0); } }
  @keyframes introPulse {
    0%, 100% { box-shadow: 0 8px 30px -6px rgba(99,102,241,0.55); transform: scale(1); }
    50%      { box-shadow: 0 12px 44px -4px rgba(129,140,248,0.95); transform: scale(1.04); }
  }

  .intro-skip {
    position: absolute;
    bottom: 22px;
    right: 24px;
    z-index: 2;
    background: rgba(255,255,255,0.08);
    color: #c7cbe6;
    border: 1px solid rgba(255,255,255,0.16);
    padding: 7px 15px;
    border-radius: 999px;
    font: 600 12.5px 'Inter', sans-serif;
    cursor: pointer;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    transition: background 0.2s ease, color 0.2s ease;
  }
  .intro-skip:hover { background: rgba(255,255,255,0.18); color: #fff; }

  @media (max-width: 820px) {
    /* Not enough width for a side panel — stack the CTA under the sphere. */
    .intro-sphere { transform: none; }
    .intro-cta {
      top: auto;
      bottom: 7%;
      right: 0;
      left: 0;
      transform: none;
      max-width: none;
      text-align: center;
    }
  }
  @media (max-width: 640px) {
    .intro-word { font-size: 12.5px; }
    .intro-tagline { font-size: 18px; margin-bottom: 20px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .intro-cta-inner { animation: none; opacity: 1; transform: none; }
    .intro-btn { animation: none; }
  }

  /* ================= "Built with Claude" seal ================= */
  .seal-badge {
    position: fixed;
    top: 20px;
    /* Sit inside the reserved right gutter of the content column. */
    right: max(20px, calc((100vw - 1200px) / 2 + 24px));
    width: 76px;
    height: 76px;
    z-index: 10000; /* above the intro overlay so it shows during the animation */
    padding: 0;
    border: none;
    cursor: pointer;
    border-radius: 18px;
    overflow: hidden;
    display: grid;
    place-items: center;
    background: #6366f1;
    box-shadow: 0 8px 26px -6px rgba(124, 58, 237, 0.55);
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.25), box-shadow 0.25s ease;
  }
  .seal-badge.seal-visible { opacity: 1; transform: scale(1); }
  .seal-badge:hover { box-shadow: 0 12px 34px -4px rgba(124, 58, 237, 0.8); }
  /* Fade out of the way while the reader is actively scrolling. */
  .seal-badge.seal-scrolling {
    opacity: 0.12;
    transform: scale(0.9) translateY(8px);
    pointer-events: none;
  }

  /* Rotating multicolor gradient = the moving border. */
  .seal-badge::before {
    content: "";
    position: absolute;
    top: -25%;
    left: -25%;
    width: 150%;
    height: 150%;
    background: conic-gradient(from 0deg, #6366f1, #2dd4bf, #fbbf24, #fb7185, #a855f7, #38bdf8, #6366f1);
    animation: sealSpin 4s linear infinite;
  }
  .seal-badge:hover::before { animation-duration: 1.8s; }

  .seal-inner {
    position: absolute;
    inset: 3px;
    z-index: 1;
    border-radius: 15px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    text-align: center;
  }
  .seal-spark {
    width: 14px;
    height: 14px;
    color: var(--accent);
    margin-bottom: 2px;
    filter: drop-shadow(0 0 4px rgba(99, 102, 241, 0.4));
  }
  .seal-l1 {
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .seal-l2 {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    line-height: 1.05;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .seal-l3 {
    font-size: 7.5px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  @keyframes sealSpin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .seal-badge { width: 66px; height: 66px; top: 12px; right: 12px; border-radius: 14px; }
    .seal-spark { width: 12px; height: 12px; margin-bottom: 1px; }

<script>
/* ================= Intro 3D skill sphere ================= */
(function () {
  const overlay = document.getElementById("intro-overlay");
  if (!overlay) return;
  const sphere = document.getElementById("intro-sphere");
  const skipBtn = document.getElementById("intro-skip");
  const bg = overlay.querySelector(".intro-bg");

  // Brightened palette that glows on the dark backdrop.
  const palette = ["#a78bfa", "#818cf8", "#2dd4bf", "#fbbf24", "#fb7185", "#38bdf8"];
  const words = [
    // Core skills first — these lead the fly-in.
    "Causal Inference", "Propensity Modeling", "AI Workflows", "Python", "SQL",
    "A/B Experimentation", "Propensity Score Matching", "dbt", "AWS",
    // Full stack.
    "XGBoost", "LightGBM", "Random Forest", "Scikit-learn", "SHAP",
    "Difference-in-Differences", "Bayesian Optimization", "Experiment Design",
    "Segmentation", "Time Series Forecasting", "Retention & Churn",
    "Agentic AI", "Claude", "Prompt Engineering", "MCP", "Semantic Layer",
    "LLM Agents", "BigQuery", "Vertex AI", "GCP", "Snowflake",
    "Apache Airflow", "Apache Spark", "Amplitude", "Looker", "Tableau", "Pandas"
  ];

  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // Even distribution on a sphere (Fibonacci lattice) -> unit vectors.
  const N = words.length;
  const gold = Math.PI * (1 + Math.sqrt(5));
  const items = words.map(function (text, i) {
    const y = 1 - (i + 0.5) / N * 2;      // 1 .. -1
    const r = Math.sqrt(1 - y * y);
    const theta = gold * i;
    const color = palette[i % palette.length];
    const el = document.createElement("span");
    el.className = "intro-word";
    el.textContent = text;
    el.style.color = color;
    sphere.appendChild(el);
    return {
      el: el,
      color: color,
      ux: Math.cos(theta) * r,
      uy: y,
      uz: Math.sin(theta) * r,
      jx: (Math.random() * 2 - 1) * 70,   // entrance jitter
      jy: (Math.random() * 2 - 1) * 70
    };
  });

  // Hover boost (kept out of the RAF-driven transform, applied via scale factor).
  let hovered = null;
  sphere.addEventListener("mouseover", function (e) {
    if (e.target.classList.contains("intro-word")) hovered = e.target;
  });
  sphere.addEventListener("mouseout", function (e) {
    if (e.target === hovered) hovered = null;
  });

  // Cursor glow + gentle parallax.
  let mx = 0, my = 0;
  overlay.addEventListener("mousemove", function (e) {
    bg.style.setProperty("--mx", e.clientX + "px");
    bg.style.setProperty("--my", e.clientY + "px");
    mx = (e.clientX / window.innerWidth) * 2 - 1;
    my = (e.clientY / window.innerHeight) * 2 - 1;
  });

  const ENTER_DUR = 0.85;   // per-word fly-in duration (s)
  const STAGGER = 0.55;     // spread of start times (s)
  const easeOut = function (p) { return 1 - Math.pow(1 - p, 3); };

  let raf = null;
  const start = performance.now();

  function render(now) {
    const t = (now - start) / 1000;
    const R = Math.max(160, Math.min(window.innerWidth, window.innerHeight) * 0.33);
    const P = R * 2;                                   // perspective depth
    const angleY = t * 0.35 + mx * 0.6;                // auto-spin + mouse
    const tilt = -0.32 + my * 0.22;
    const cosY = Math.cos(angleY), sinY = Math.sin(angleY);
    const cosX = Math.cos(tilt), sinX = Math.sin(tilt);

    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      let x = it.ux * R, y = it.uy * R, z = it.uz * R;
      // rotate Y
      let x1 = x * cosY + z * sinY;
      let z1 = -x * sinY + z * cosY;
      // rotate X (tilt)
      let y2 = y * cosX - z1 * sinX;
      let z2 = y * sinX + z1 * cosX;
      let x2 = x1;

      const s = P / (P - z2);                          // perspective scale
      const depth = (z2 + R) / (2 * R);                // 0 (back) .. 1 (front)

      // Entrance: fly in from far outside, staggered.
      const ep = reduce ? 1 : Math.min(1, Math.max(0, (t - (i / N) * STAGGER) / ENTER_DUR));
      const e = easeOut(ep);
      const radial = 1 + (1 - e) * 4.5;                // pushed outward early
      const jit = (1 - e);

      let px = x2 * s * radial + it.jx * jit;
      let py = y2 * s * radial + it.jy * jit;
      let scale = s * (1 + (1 - e) * 1.3);
      if (it.el === hovered) scale *= 1.4;

      const op = (0.30 + 0.70 * depth) * e;
      const blur = (1 - depth) * 2.2;
      const bright = it.el === hovered ? 1.6 : 1;

      it.el.style.transform =
        "translate(-50%,-50%) translate3d(" + px + "px," + py + "px,0) scale(" + scale + ")";
      it.el.style.opacity = op;
      it.el.style.zIndex = Math.round(depth * 100);
      it.el.style.filter = "blur(" + blur + "px) brightness(" + bright + ")";
      it.el.style.textShadow = "0 0 14px " + it.color + "aa, 0 0 4px " + it.color;
    }

    raf = requestAnimationFrame(render);
  }

  raf = requestAnimationFrame(render);
  if (reduce) skipBtn.focus();

  // Enter the site.
  let dismissed = false;
  function enter() {
    if (dismissed) return;
    dismissed = true;
    overlay.classList.add("intro-hide");
    document.body.classList.add("intro-done");
    document.body.style.overflow = "";
    setTimeout(function () {
      if (raf) cancelAnimationFrame(raf);
      overlay.style.display = "none";
    }, 720);
  }

  document.body.style.overflow = "hidden";
  overlay.addEventListener("click", enter);
  skipBtn.addEventListener("click", function (e) { e.stopPropagation(); enter(); });

  // Persistent seal -> opens the "How This Site Was Built" case study.
  const seal = document.getElementById("seal-badge");
  if (seal) {
    // Reveal immediately so the seal is visible on the intro/animation screen too.
    requestAnimationFrame(function () { seal.classList.add("seal-visible"); });
    seal.addEventListener("click", function () {
      enter(); // dismiss the intro if it's still up
      if (typeof selectProject === "function") selectProject("ai-built-portfolio");
    });
    // Get out of the way while scrolling; fade back once it stops.
    let sealTimer;
    window.addEventListener("scroll", function () {
      seal.classList.add("seal-scrolling");
      clearTimeout(sealTimer);
      sealTimer = setTimeout(function () { seal.classList.remove("seal-scrolling"); }, 550);
    }, { passive: true });
  }
})();
</script>
